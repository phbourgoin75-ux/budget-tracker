<style>
  :root{
    --navy:#1B2A4A;
    --navy-2:#24365E;
    --slate:#5B6B82;

  .period-picker{

    border-radius:9px; padding:9px 16px; font-size:13px; transition:transform .08s ease, opacity .15s;

  .btn:active{transform:scale(.97);}
  .btn-mint{background:var(--mint); color:#fff;}
  .btn-navy{background:var(--navy); color:#fff;}
  .btn-ghost{background:#fff; color:var(--navy); border:1px solid var(--border);}
  .btn-coral{background:var(--coral); color:#fff;}
  .btn-sm{padding:6px 10px; font-size:12px; border-radius:7px;}
  .btn:disabled{opacity:.5; cursor:default;}

  /* ---------- Layout ---------- */
  .grid{display:grid; grid-template-columns:1.15fr .85fr; gap:20px; margin-top:22px;}
  @media (max-width:960px){ .grid{grid-template-columns:1fr;} }

  .expense-row{

  .expense-row input[type=number]{border:1px solid var(--border); border-radius:7px; padding:5px 6px; font-size:13px; text-align:right; width:100%; background:#FAFBFC;}

  /* ---------- Savings ---------- */
  .savings-card{background:var(--navy); color:#fff; border:none;}
  .savings-card .section-title{color:#9FB0CC;}
  .sav-row{
    display:grid; grid-template-columns:1fr 100px 30px; gap:8px; align-items:center; padding:6px 0;
    border-bottom:1px solid rgba(255,255,255,.08);
  }
  .sav-row.with-ref{grid-template-columns:24px 1fr 100px 30px;}
  .ref-radio{width:16px; height:16px; cursor:pointer; accent-color:var(--mint); margin:0;}
  .ref-hint{font-size:11px; color:#9FB0CC; margin:-4px 0 8px;}
  .sav-row input[type=text]{border:none; background:transparent; color:#fff; font-size:13px; font-weight:500; width:100%; padding:3px 2px;}
  .sav-row input[type=number]{border:1px solid rgba(255,255,255,.18); background:rgba(255,255,255,.06); color:#fff; border-radius:7px; padding:5px 6px; font-size:13px; text-align:right; width:100%;}
  .sav-total{display:flex; justify-content:space-between; align-items:center; margin-top:12px; padding-top:12px; border-top:1px solid rgba(255,255,255,.18); font-weight:800; font-size:16px; font-family:'Manrope',sans-serif;}

  .footer-actions{display:flex; gap:10px; margin-top:6px; flex-wrap:wrap;}
  .save-indicator{font-size:11.5px; color:var(--muted); display:flex; align-items:center; gap:6px; margin-top:14px; flex-wrap:wrap;}
  .user-chip{margin-left:auto; color:var(--muted);}
  .user-chip a{color:var(--slate); text-decoration:underline; cursor:pointer;}
  .login-screen{
    min-height:70vh; display:flex; align-items:center; justify-content:center;
  }
  .login-card{
    background:var(--card); border:1px solid var(--border); border-radius:18px;
    padding:36px 32px; max-width:360px; width:100%; text-align:center;
    box-shadow:0 8px 30px rgba(27,42,74,.08);

  .dot{width:7px; height:7px; border-radius:50%; background:var(--mint);}

  .history{margin-top:10px;}
  .history-row{display:flex; justify-content:space-between; font-size:12px; color:var(--muted); padding:5px 0; border-bottom:1px dashed var(--border);}

  /* remove up/down steppers on all number fields - manual typing only */
  input[type=number]{ -moz-appearance:textfield; }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
</style>

<body>
<div class="wrap" id="app"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import {
    getFirestore, doc, getDoc, setDoc, onSnapshot
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAhwnv8CPICi-w7FwKjwDBIJ44jo53Fies",
    authDomain: "budget-perso-fe0c3.firebaseapp.com",
    projectId: "budget-perso-fe0c3",
    storageBucket: "budget-perso-fe0c3.firebasestorage.app",
    messagingSenderId: "1033361611250",
    appId: "1:1033361611250:web:2a9ef7dd623cd246e1336b"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  window.fb = {
    signIn: () => signInWithPopup(auth, provider).catch(e => alert("Connexion impossible : " + e.message)),
    signOutUser: () => signOut(auth),
    onAuthChange: (cb) => onAuthStateChanged(auth, cb),
    loadDoc: (uid) => getDoc(doc(db, "budgets", uid)),
    saveDoc: (uid, data) => setDoc(doc(db, "budgets", uid), data),
    watchDoc: (uid, cb) => onSnapshot(doc(db, "budgets", uid), cb),
  };
  window.dispatchEvent(new Event('fb-ready'));
</script>
<script>
/* ============================= STATE ============================= */
const uid = () => Math.random().toString(36).slice(2,9);

const DEFAULT_DATA = () => ({
  periodEnd: null,   // ISO date string, editable by the user — start is always "today"
  soldeBanque: 28070,
  fixedCharges: [
    {id:uid(), cat:"Appart Castel", label:"Mensualité Castel", prevu:911, paid:false, jour:"06 du mois"},
    {id:uid(), cat:"Appart Castel", label:"Charges Castel", prevu:224, paid:false, jour:"13 du mois"},
    {id:uid(), cat:"Appart Castel", label:"Location Box motos", prevu:76.25, paid:false, jour:"1er du mois"},
    {id:uid(), cat:"Appart Castel", label:"Emprunt Eco PTZ", prevu:64, paid:false, jour:"1er du mois"},
    {id:uid(), cat:"Appart Castel", label:"Emprunt 8000€", prevu:137, paid:false, jour:"04 du mois"},
    {id:uid(), cat:"Appart Castel", label:"Prélèvement UFF", prevu:196, paid:false, jour:"05 du mois"},
    {id:uid(), cat:"Appart Castel", label:"Prélèvement PEL", prevu:50, paid:false, jour:"16 du mois"},
    {id:uid(), cat:"Appart Castel", label:"Macif", prevu:124, paid:false, jour:"05 du mois"},
    {id:uid(), cat:"Appart Castel", label:"EDF", prevu:45, paid:false, jour:"09 du mois"},
    {id:uid(), cat:"Appart Castel", label:"Frais BQ", prevu:16.8, paid:false, jour:"16 du mois"},
    {id:uid(), cat:"Appart Castel", label:"Chat GPT Pro", prevu:23, paid:false, jour:"29 du mois"},
    {id:uid(), cat:"Appart Castel", label:"Netflix", prevu:22, paid:false, jour:"29 du mois"},
    {id:uid(), cat:"Appart Castel", label:"Canal +", prevu:26, paid:false, jour:"20 du mois"},
    {id:uid(), cat:"Appart Castel", label:"Box@ SFR", prevu:26, paid:false, jour:"07 du mois"},
    {id:uid(), cat:"Impôts", label:"Taxe Foncière", prevu:167, paid:false, jour:"15 du mois"},
    {id:uid(), cat:"Enfants", label:"LOYER Hannah", prevu:300, paid:false, jour:"1er du mois"},
    {id:uid(), cat:"Enfants", label:"Frais de vie Hannah", prevu:500, paid:false, jour:"1er du mois"},
    {id:uid(), cat:"Enfants", label:"Abo SFR H&M", prevu:20, paid:false, jour:"14 du mois"},
  ],
  dailyExpenses: [],
  savings: {
    liquide: [
      {id:uid(), label:"Cpte courant Socgen", amount:9703},
      {id:"ref-caisse-ep", label:"Cpte courant Caisse d'Ep.", amount:25870},
      {id:uid(), label:"PEL Caisse Epargne", amount:6080},
      {id:uid(), label:"Trade Republic", amount:1350},
    ],
    solide: [
      {id:uid(), label:"Assurance Vie (UFF)", amount:29474},
      {id:uid(), label:"PER (UFF)", amount:17656},
      {id:uid(), label:"PERCOL 2026 SFR (Natixis)", amount:1825},
      {id:uid(), label:"PEG Natixis (SFR)", amount:1448},
      {id:uid(), label:"PERCO AXA (SFR)", amount:3613},
      {id:uid(), label:"PERCO AXA (Dell 98 Cadre)", amount:18555},
      {id:uid(), label:"PERCO AXA (Dell 98 autre)", amount:4106},
    ]
  },
  history: [],
  refAccountId: "ref-caisse-ep"
});

let data = null;
let currentUser = null;
let unsubscribeSnapshot = null;

/* ============================= PAY-PERIOD LOGIC ============================= */
// Ces fonctions ne servent qu'à proposer une période par défaut au premier lancement.
// Ensuite, la période est 100% pilotée par le sélecteur de date de fin (modifiable à tout moment).
function lastDayOfMonth(y,m){ return new Date(y, m+1, 0); }
function payDay(y,m){ const d = lastDayOfMonth(y,m); d.setDate(d.getDate()-3); d.setHours(0,0,0,0); return d; }
function suggestedPeriod(today){
  const y=today.getFullYear(), m=today.getMonth();
  const thisPay = payDay(y,m);
  let start,end;
  if(today >= thisPay){
    start = thisPay;
    const nm = m===11?0:m+1, ny = m===11?y+1:y;
    end = payDay(ny,nm); end.setDate(end.getDate()-1);
  } else {
    const pm = m===0?11:m-1, py = m===0?y-1:y;
    start = payDay(py,pm);
    end = new Date(thisPay); end.setDate(end.getDate()-1);
  }
  return {start,end};
}
function parseISO(s){ const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); }
function fmtDate(d){ return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function isoDate(d){ return d.toISOString().slice(0,10); }
function todayMidnight(){ const d = new Date(); d.setHours(0,0,0,0); return d; }

function normalizeData(raw){
  let d = raw;
  if(!d){ d = DEFAULT_DATA(); }
  if(!d.periodEnd){ d.periodEnd = isoDate(suggestedPeriod(todayMidnight()).end); }
  delete d.periodStart;
  d.fixedCharges.forEach(c=>{
    if(c.paid===undefined){ c.paid = !!(c.reel!==null && c.reel!==undefined && c.reel!==""); }
    delete c.reel;
  });
  if(!d.refAccountId){
    const match = d.savings.liquide.find(a=>/caisse.*ep/i.test(a.label));
    d.refAccountId = match ? match.id : (d.savings.liquide[0] ? d.savings.liquide[0].id : null);
  }
  if(!d.history) d.history = [];
  return d;
}

/* ============================= AUTH + STORAGE (Firebase) ============================= */
function renderLogin(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="login-screen">
      <div class="login-card">
        <p class="hero-title" style="color:var(--navy);margin-bottom:8px;">💶 Budget mensuel</p>
        <p style="color:var(--muted);font-size:13.5px;margin:0 0 22px;">Connecte-toi avec Google pour accéder à ton budget, synchronisé sur tous tes appareils.</p>
        <button class="btn btn-navy" style="width:100%;" onclick="window.fb.signIn()">Se connecter avec Google</button>
      </div>
    </div>
  `;
}

async function onUserSignedIn(user){
  currentUser = user;
  const snap = await window.fb.loadDoc(user.uid);
  data = normalizeData(snap.exists() ? snap.data() : null);
  if(!snap.exists()){ await window.fb.saveDoc(user.uid, data); }
  render();
  if(unsubscribeSnapshot){ unsubscribeSnapshot(); }
  unsubscribeSnapshot = window.fb.watchDoc(user.uid, (snap)=>{
    if(!snap.exists() || snap.metadata.hasPendingWrites) return; // écho de notre propre écriture
    const incoming = normalizeData(snap.data());
    if(JSON.stringify(incoming) !== JSON.stringify(data)){
      data = incoming;
      render();
    }
  });
}

function boot(){
  window.fb.onAuthChange((user)=>{
    if(!user){
      currentUser = null;
      if(unsubscribeSnapshot){ unsubscribeSnapshot(); unsubscribeSnapshot=null; }
      renderLogin();
      return;
    }
    onUserSignedIn(user);
  });
}

let saveTimer=null, saveState="saved";
function scheduleSave(){
  if(!currentUser) return;
  saveState="saving"; updateSaveIndicator();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{
      await window.fb.saveDoc(currentUser.uid, data);
      saveState="saved";
    }catch(e){ saveState="error"; }
    updateSaveIndicator();
  }, 450);
}
function updateSaveIndicator(){
  const el = document.getElementById('save-indicator');
  if(!el) return;
  const who = currentUser ? `<span class="user-chip">${currentUser.email} · <a href="#" onclick="window.fb.signOutUser();return false;">déconnexion</a></span>` : '';
  if(saveState==="saving"){ el.innerHTML = '<span class="dot" style="background:#E8B84B"></span> Synchronisation…' + who; }
  else if(saveState==="error"){ el.innerHTML = '<span class="dot" style="background:#E8604C"></span> Erreur de synchronisation' + who; }
  else { el.innerHTML = '<span class="dot"></span> Synchronisé' + who; }
}

/* ============================= COMPUTATIONS ============================= */
function num(v){ return (v===null || v===undefined || v==="" || isNaN(v)) ? 0 : parseFloat(v); }
function eur(v){ return num(v).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+" €"; }
function eur0(v){ return Math.round(num(v)).toLocaleString('fr-FR')+" €"; }

function computeTotals(){
  const totalPrevu = data.fixedCharges.reduce((s,c)=>s+num(c.prevu),0);
  const totalReel = data.fixedCharges.reduce((s,c)=>s+(c.paid?num(c.prevu):0),0);
  const chargesFixesRestantes = totalPrevu - totalReel; // charges pas encore payées
  const totalDaily = data.dailyExpenses.reduce((s,e)=>s+num(e.amount),0);
  const depensesEnAttente = totalDaily; // uniquement les dépenses du jour
  const refAccount = data.savings.liquide.find(a=>a.id===data.refAccountId) || null;
  const refAmount = refAccount ? num(refAccount.amount) : 0;
  const resteAVivreMensuel = num(data.soldeBanque) - refAmount - chargesFixesRestantes - depensesEnAttente;
  const start = todayMidnight();
  const end = parseISO(data.periodEnd);
  const today = todayMidnight();
  const joursRestants = Math.max(0, Math.floor((end-today)/86400000));
  const resteAVivreQuotidien = joursRestants>0 ? resteAVivreMensuel/joursRestants : resteAVivreMensuel;
  const totalLiquide = data.savings.liquide.reduce((s,a)=>s+num(a.amount),0);
  const totalSolide = data.savings.solide.reduce((s,a)=>s+num(a.amount),0);
  return {totalPrevu,totalReel,chargesFixesRestantes,totalDaily,depensesEnAttente,resteAVivreMensuel,resteAVivreQuotidien,periodEnd:end,joursRestants,totalLiquide,totalSolide,totalEpargne:totalLiquide+totalSolide,refAccount,refAmount};
}

/* ============================= ACTIONS ============================= */
function addFixedCharge(cat){
  data.fixedCharges.push({id:uid(),cat,label:"Nouvelle charge",prevu:0,paid:false,jour:""});
  scheduleSave(); render();
}
function removeFixedCharge(id){
  data.fixedCharges = data.fixedCharges.filter(c=>c.id!==id);
  scheduleSave(); render();
}
function addExpense(){
  data.dailyExpenses.unshift({id:uid(), date:isoDate(todayMidnight()), label:"", amount:""});
  scheduleSave(); render();
}
function removeExpense(id){
  data.dailyExpenses = data.dailyExpenses.filter(e=>e.id!==id);
  scheduleSave(); render();
}
function addSavingsItem(bucket){
  data.savings[bucket].push({id:uid(), label:"Nouveau compte", amount:0});
  scheduleSave(); render();
}
function removeSavingsItem(bucket,id){
  data.savings[bucket] = data.savings[bucket].filter(a=>a.id!==id);
  scheduleSave(); render();
}
function startNewMonth(){
  const t = computeTotals();
  data.history.unshift({
    start: isoDate(todayMidnight()),
    end: data.periodEnd,
    totalReel: t.totalReel,
    totalDaily: t.totalDaily,
    totalDepenses: t.depensesEnAttente,
    soldeBanque: num(data.soldeBanque),
    closedAt: new Date().toISOString()
  });
  data.history = data.history.slice(0,12);
  data.fixedCharges.forEach(c=>c.paid=false);
  data.dailyExpenses = [];
  // propose une nouvelle date de fin de période (prochaine paye), modifiable ensuite à la main
  data.periodEnd = isoDate(suggestedPeriod(todayMidnight()).end);
  scheduleSave(); render();
}

function exportExcel(){
  const t = computeTotals();
  const wb = XLSX.utils.book_new();
  const rows = [];
  rows.push(["BUDGET MENSUEL", "", "", ""]);
  rows.push(["Période", fmtDate(todayMidnight())+" → "+fmtDate(t.periodEnd)]);
  rows.push(["Solde banque brut", num(data.soldeBanque)]);
  rows.push(["Compte référence déduit", t.refAccount?t.refAccount.label:"", t.refAmount]);
  rows.push(["Charges fixes restantes", t.chargesFixesRestantes]);
  rows.push(["Dépenses courantes en attente", t.depensesEnAttente]);
  rows.push(["Reste à vivre mensuel", t.resteAVivreMensuel]);
  rows.push(["Reste à vivre quotidien", Math.round(t.resteAVivreQuotidien*100)/100]);
  rows.push([]);
  rows.push(["CHARGES FIXES","Catégorie","Prévu (€)","Payé ?","Jour de prélèvement"]);
  data.fixedCharges.forEach(c=>rows.push([c.label,c.cat,num(c.prevu),c.paid?"Oui":"",c.jour||""]));
  rows.push(["", "", t.totalPrevu, t.totalReel, ""]);
  rows.push([]);
  rows.push(["DÉPENSES DU JOUR","Date","Libellé","Montant (€)"]);
  data.dailyExpenses.forEach(e=>rows.push(["",e.date,e.label,num(e.amount)]));
  rows.push(["", "", "TOTAL", t.totalDaily]);
  rows.push([]);
  rows.push(["ÉPARGNE LIQUIDE","Libellé","Montant (€)"]);
  data.savings.liquide.forEach(a=>rows.push(["",a.label,num(a.amount)]));
  rows.push(["", "TOTAL", t.totalLiquide]);
  rows.push([]);
  rows.push(["ÉPARGNE SOLIDE / RETRAITE","Libellé","Montant (€)"]);
  data.savings.solide.forEach(a=>rows.push(["",a.label,num(a.amount)]));
  rows.push(["", "TOTAL", t.totalSolide]);
  rows.push([]);
  rows.push(["TOTAL ÉPARGNE", "", t.totalEpargne]);
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:30},{wch:22},{wch:16},{wch:18},{wch:16}];
  XLSX.utils.book_append_sheet(wb, ws, "Budget");
  const filename = "budget_"+isoDate(todayMidnight())+".xlsx";
  XLSX.writeFile(wb, filename);
}

/* ============================= RENDER ============================= */
function render(){
  const t = computeTotals();
  const app = document.getElementById('app');
  const cats = [...new Set(data.fixedCharges.map(c=>c.cat))];

  app.innerHTML = `
    <div class="hero">
      <div class="hero-top">
        <div>
          <p class="hero-title">💶 Budget mensuel</p>
        </div>
        <div class="period-picker">
          <label>Du <span class="today-fixed">${fmtDate(todayMidnight())}</span></label>
          <label>au <input type="date" id="input-period-end" value="${data.periodEnd}"></label>
          <span class="days-left">⏳ ${t.joursRestants} j restants</span>
        </div>
      </div>
      <div class="kpis">
        <div class="kpi">
          <div class="lbl">Charges fixes restantes</div>
          <div class="val">${eur(t.chargesFixesRestantes)}</div>
          <div class="sub">${eur(t.totalReel)} déjà payées sur ${eur(t.totalPrevu)}</div>
        </div>
        <div class="kpi">
          <div class="lbl">Dépenses courantes en attente</div>
          <div class="val">${eur(t.depensesEnAttente)}</div>
          <div class="sub">somme des dépenses du jour</div>
        </div>
        <div class="kpi">
          <div class="lbl">Solde banque brut</div>
          <input type="number" step="0.01" value="${data.soldeBanque}" id="input-solde">
          <div class="sub">à mettre à jour manuellement</div>
        </div>
        <div class="kpi">
          <div class="lbl">Reste à vivre mensuel</div>
          <div class="val ${t.resteAVivreMensuel>=0?'pos':'neg'}">${eur(t.resteAVivreMensuel)}</div>
          <div class="sub">Solde brut − ${t.refAccount?t.refAccount.label:'(aucun compte réf.)'} − charges restantes − dép. en attente</div>
        </div>
        <div class="kpi">
          <div class="lbl">Reste à vivre quotidien</div>
          <div class="val ${t.resteAVivreQuotidien>=0?'pos':'neg'}">${eur(t.resteAVivreQuotidien)}</div>
          <div class="sub">reste à vivre mensuel ÷ ${t.joursRestants} j restants</div>
        </div>
      </div>
    </div>

    <div class="grid">
      <!-- LEFT COLUMN -->
      <div>
        <div class="card">
          <h2>🏠 Charges fixes</h2>
          <div class="card-sub">Prévu = mensualité habituelle · Payé = coche/monte quand le prélèvement est passé ce mois-ci</div>
          ${cats.map(cat=>`
            <div class="section-title">
              <span>${cat}</span>
              <span class="section-total">${eur(data.fixedCharges.filter(c=>c.cat===cat).reduce((s,c)=>s+num(c.prevu),0))}</span>
            </div>
            <div class="col-labels"><span>Libellé</span><span style="text-align:right">Prévu</span><span style="text-align:center">Payé</span><span>Jour</span><span></span></div>
            ${data.fixedCharges.filter(c=>c.cat===cat).map(c=>`
              <div class="charge-row ${c.paid?'is-paid':''}">
                <input type="text" value="${c.label}" onchange="updateCharge('${c.id}','label',this.value)">
                <input type="number" step="0.01" value="${c.prevu}" onchange="updateCharge('${c.id}','prevu',this.value)">
                <span class="paid-check"><input type="checkbox" ${c.paid?'checked':''} onchange="updateCharge('${c.id}','paid',this.checked)" title="Marquer comme payé"></span>
                <input type="text" class="jour" value="${c.jour||''}" onchange="updateCharge('${c.id}','jour',this.value)">
                <button class="icon-btn" onclick="removeFixedCharge('${c.id}')" title="Supprimer">✕</button>
              </div>
            `).join('')}
          `).join('')}
          <button class="add-row-btn" onclick="addFixedCharge('${cats[cats.length-1]||'Autre'}')">+ Ajouter une charge fixe</button>
        </div>

        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <h2 style="margin-bottom:0">🧾 Dépenses du jour</h2>
            <span class="section-total">${eur(t.totalDaily)}</span>
          </div>
          <div class="card-sub">Ajoute une ligne à chaque dépense courante ou exceptionnelle</div>
          <button class="add-row-btn" style="margin-top:0;margin-bottom:12px;" onclick="addExpense()">+ Ajouter une dépense</button>
          ${data.dailyExpenses.length===0 ? `<div class="empty-state">Aucune dépense saisie pour l'instant.</div>` : `
            <div class="col-labels" style="grid-template-columns:92px 1fr 90px 30px;"><span>Date</span><span>Libellé</span><span style="text-align:right">Montant</span><span></span></div>
            ${[...data.dailyExpenses].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(e=>`
              <div class="expense-row">
                <input type="date" value="${e.date}" onchange="updateExpense('${e.id}','date',this.value)">
                <input type="text" placeholder="ex: Carrefour city" value="${e.label}" onchange="updateExpense('${e.id}','label',this.value)">
                <input type="number" step="0.01" placeholder="0.00" value="${e.amount}" onchange="updateExpense('${e.id}','amount',this.value)">
                <button class="icon-btn" onclick="removeExpense('${e.id}')" title="Supprimer">✕</button>
              </div>
            `).join('')}
          `}
        </div>
      </div>

      <!-- RIGHT COLUMN -->
      <div>
        <div class="card savings-card">
          <h2>🛡️ Épargne & patrimoine</h2>
          <div class="section-title"><span>Épargne liquide</span><span class="section-total" style="color:#fff">${eur0(t.totalLiquide)}</span></div>
          <div class="ref-hint">○ coche le compte à déduire du solde brut pour calculer le reste à vivre</div>
          ${data.savings.liquide.map(a=>`
            <div class="sav-row with-ref">
              <input type="radio" class="ref-radio" name="refAccount" ${data.refAccountId===a.id?'checked':''} onchange="setRefAccount('${a.id}')" title="Utiliser pour le reste à vivre">
              <input type="text" value="${a.label}" onchange="updateSaving('liquide','${a.id}','label',this.value)">
              <input type="number" value="${a.amount}" onchange="updateSaving('liquide','${a.id}','amount',this.value)">
              <button class="icon-btn" onclick="removeSavingsItem('liquide','${a.id}')">✕</button>
            </div>
          `).join('')}
          <button class="add-row-btn" style="background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.22);color:#DCE6F5;" onclick="addSavingsItem('liquide')">+ Ajouter un compte</button>

          <div class="section-title" style="margin-top:20px;"><span>Épargne solide / retraite</span><span class="section-total" style="color:#fff">${eur0(t.totalSolide)}</span></div>
          ${data.savings.solide.map(a=>`
            <div class="sav-row">
              <input type="text" value="${a.label}" onchange="updateSaving('solide','${a.id}','label',this.value)">
              <input type="number" value="${a.amount}" onchange="updateSaving('solide','${a.id}','amount',this.value)">
              <button class="icon-btn" onclick="removeSavingsItem('solide','${a.id}')">✕</button>
            </div>
          `).join('')}
          <button class="add-row-btn" style="background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.22);color:#DCE6F5;" onclick="addSavingsItem('solide')">+ Ajouter un compte</button>

          <div class="sav-total"><span>Total épargne</span><span class="v">${eur0(t.totalEpargne)}</span></div>
        </div>

        <div class="card">
          <h2>⚙️ Gestion du mois</h2>
          <div class="card-sub">Le salaire tombe 3 jours avant la fin de chaque mois : c'est le point de départ automatique de chaque période.</div>
          <button class="btn btn-navy" style="width:100%;" onclick="startNewMonth()">Démarrer un nouveau mois maintenant</button>
          ${data.history.length>0 ? `
            <div class="history">
              <div class="section-title" style="margin-top:16px;"><span>Historique</span></div>
              ${data.history.map(h=>`
                <div class="history-row"><span>${fmtDate(new Date(h.start))} → ${fmtDate(new Date(h.end))}</span><span>${eur(h.totalDepenses)} dépensés</span></div>
              `).join('')}
            </div>
          ` : ``}
        </div>

        <div class="card">
          <h2>⬇️ Export</h2>
          <div class="card-sub">Télécharge un fichier Excel à jour de toutes tes données.</div>
          <button class="btn btn-ghost" style="width:100%;" onclick="exportExcel()">Exporter en .xlsx</button>
        </div>
      </div>
    </div>
    <div class="save-indicator" id="save-indicator"></div>
  `;
  updateSaveIndicator();

  document.getElementById('input-solde').addEventListener('change', function(){
    data.soldeBanque = this.value; scheduleSave(); render();
  });
  document.getElementById('input-period-end').addEventListener('change', function(){
    data.periodEnd = this.value; scheduleSave(); render();
  });
}

function updateCharge(id, field, value){
  const c = data.fixedCharges.find(c=>c.id===id);
  if(!c) return;
  if(field==='prevu'){ c.prevu = value===''?0:parseFloat(value); }
  else if(field==='paid'){ c.paid = !!value; }
  else { c[field] = value; }
  scheduleSave(); render();
}
function setRefAccount(id){
  data.refAccountId = id;
  scheduleSave(); render();
}
function updateExpense(id, field, value){
  const e = data.dailyExpenses.find(e=>e.id===id);
  if(!e) return;
  e[field] = field==='amount' ? value : value;
  scheduleSave(); render();
}
function updateSaving(bucket, id, field, value){
  const a = data.savings[bucket].find(a=>a.id===id);
  if(!a) return;
  a[field] = field==='amount' ? parseFloat(value)||0 : value;
  scheduleSave(); render();
}

if(window.fb){ boot(); } else { window.addEventListener('fb-ready', boot, {once:true}); }
</script>
</body>
</html>
